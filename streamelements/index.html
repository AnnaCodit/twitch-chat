<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CRT Random Chat Overlay</title>
    <style>
        /* === Базовая разметка === */
        html,
        body {
            height: 100%;
            margin: 0;
            background: #000;
            overflow: hidden
        }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            font-family: "Courier New", Courier, monospace;
            --accent: #39ff14;
            /* кислотно-зеленый */
            --bg: #000;
        }

        /* === Scanlines / CRT effect overlay === */
        .crt::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(0, 0, 0, 0) 0 50%, rgba(0, 0, 0, 0.06) 50%),
                radial-gradient(ellipse at center, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.75));
            background-size: 100% 2px, cover;
            mix-blend-mode: soft-light;
            pointer-events: none;
            z-index: 999;
            opacity: 0.85;
        }

        .crt::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(90deg, rgba(0, 255, 0, 0.015), rgba(0, 255, 0, 0.005) 10%, transparent 30%),
                repeating-linear-gradient(180deg, rgba(0, 0, 0, 0) 0 2px, rgba(0, 0, 0, 0.04) 2px 4px);
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: overlay;
            filter: blur(0.4px);
            opacity: 0.9;
        }

        /* === Сообщение === */
        .chat-bubble {
            position: absolute;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.4));
            border-radius: 8px;
            border: 1px solid rgba(57, 255, 20, 0.06);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6), 0 0 30px rgba(57, 255, 20, 0.03) inset;
            color: var(--accent);
            font-size: 20px;
            line-height: 1.1;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            transform-origin: center;
            will-change: transform, opacity, left, top;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex: 0 0 48px;
            object-fit: cover;
            border: 2px solid rgba(57, 255, 20, 0.12);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.03);
        }

        .msg-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
            max-width: 520px;
        }

        .nick {
            font-weight: 700;
            color: var(--accent);
            font-size: 16px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.06);
        }

        .message {
            font-size: 18px;
            color: var(--accent);
            overflow-wrap: anywhere;
            display: inline-block;
            position: relative;
        }

        .emote {
            height: 24px;
            vertical-align: middle;
            margin: 0 2px;
            display: inline-block;
        }

        /* slight floating + fade */
        @keyframes floatFade {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(-6px) scale(0.995);
                opacity: 0;
            }
        }

        /* tiny glitch on text */
        @keyframes glitch {
            0% {
                text-shadow: 1px 0 0 rgba(57, 255, 20, 0.08), -1px 0 0 rgba(0, 200, 0, 0.02);
                transform: translateX(0)
            }

            20% {
                text-shadow: 6px 0 6px rgba(57, 255, 20, 0.06), -6px 0 8px rgba(0, 200, 0, 0.02);
                transform: translateX(-1px)
            }

            40% {
                text-shadow: -4px 0 4px rgba(57, 255, 20, 0.05), 4px 0 4px rgba(0, 200, 0, 0.02);
                transform: translateX(1px)
            }

            60% {
                text-shadow: 2px 0 2px rgba(57, 255, 20, 0.04);
                transform: translateX(0)
            }

            100% {
                text-shadow: 1px 0 0 rgba(57, 255, 20, 0.03);
                transform: translateX(0)
            }
        }

        .message.glitching {
            animation: glitch 2.2s infinite;
        }

        /* fade-out animation (applied when removing) */
        .fade-out {
            transition: opacity 600ms ease, transform 600ms ease;
            opacity: 0 !important;
            transform: translateY(-14px) scale(0.98) !important;
        }

        /* small responsive adjustments */
        @media (max-width:900px) {
            .chat-bubble {
                font-size: 16px;
                padding: 8px
            }

            .avatar {
                width: 40px;
                height: 40px
            }

            .message {
                font-size: 15px
            }
        }

        /* ===== Debug / test UI (not visible in final overlay if you hide with CSS) ===== */
        #control-panel {
            position: fixed;
            left: 12px;
            bottom: 12px;
            z-index: 2000;
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(57, 255, 20, 0.06)
        }

        #control-panel button {
            background: #051204;
            color: var(--accent);
            border: 1px solid rgba(57, 255, 20, 0.12);
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer
        }

        #control-panel input {
            background: #000;
            border: 1px solid rgba(57, 255, 20, 0.06);
            color: var(--accent);
            padding: 6px 8px;
            border-radius: 4px
        }
    </style>
</head>

<body>
    <div id="stage" class="crt"></div>
    <!-- Контролы для локального теста (удалите/скройте в проде) -->
    <div id="control-panel" aria-hidden="false">
        <input id="testText" value="Привет! Это тестовый message с эмоутами :) Kappa" />
        <button id="btnSmall">Тест (короткое)</button>
        <button id="btnLong">Тест (длинное)</button>
        <button id="btnEmote">Тест с эмотами</button>
        <button id="btnClear">Очистить</button>
    </div>
    <script>
        /* ========== Конфигурация ========== */
        const stage = document.getElementById('stage');
        const BASE_DURATION = 2000;        // минимальная длительность в мс
        const PER_CHAR = 55;               // добавляется мс на символ
        const MAX_DURATION = 14000;        // максимум времени показа (мс)
        const TYPING_SPEED = 18;           // мс между символами печати (уменьшите = быстрее)
        const AVOID_EDGE = 12;             // отступ от краёв для позиционирования

        /* Минимальный фавикон для случая отсутствия аватарки (встроенная SVG-dataURI) */
        const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(
            `<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect width="100%" height="100%" fill="#041204"/><text x="50%" y="50%" fill="#39ff14" font-family="Courier New, monospace" font-size="72" text-anchor="middle" alignment-baseline="central">?</text></svg>`
        );

        /* ======= Функция создания пузыря с сообщением ======= */
        function createBubble({ username, avatar, message, emotes }) {
            if (!message || message.trim().length === 0) return;

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.style.opacity = '0';

            // avatar
            const a = document.createElement('img');
            a.className = 'avatar';
            a.src = avatar || DEFAULT_AVATAR;
            a.alt = username || 'user';
            bubble.appendChild(a);

            const wrap = document.createElement('div');
            wrap.className = 'msg-wrap';

            const nick = document.createElement('div');
            nick.className = 'nick';
            nick.textContent = username || 'unknown';
            wrap.appendChild(nick);

            const msg = document.createElement('div');
            msg.className = 'message';
            wrap.appendChild(msg);

            bubble.appendChild(wrap);
            stage.appendChild(bubble);

            // сначала позиционируем произвольно (вне экрана) чтобы вставить в DOM, но мы позиционируем далее
            const stageW = stage.clientWidth;
            const stageH = stage.clientHeight;

            // временно сделаем видимым для измерения
            bubble.style.left = '0px';
            bubble.style.top = '0px';
            bubble.style.opacity = '0';
            bubble.style.transform = 'scale(0.98)';

            // Подготовка текста: заменяем эмоты, если есть маппинг
            let prepared = message;

            if (emotes && typeof emotes === 'object') {
                // ожидаем emotes = { "Kappa": "https://...", ":pog:": "..." }
                Object.keys(emotes).forEach(key => {
                    // безопасная замена: split/join
                    prepared = prepared.split(key).join(`<img class="emote" src="${emotes[key]}" alt="${key}">`);
                });
            }

            // Функция печатания: построчно вставляет HTML-safe фрагменты и эмоты
            // Подход: разбиваем prepared на массив токенов: текст/эмот (img tag)
            const tokens = [];
            const imgRegex = /<img[^>]+>/g;
            let lastIndex = 0;
            let m;
            while ((m = imgRegex.exec(prepared)) !== null) {
                if (m.index > lastIndex) tokens.push({ type: 'text', val: prepared.slice(lastIndex, m.index) });
                tokens.push({ type: 'html', val: m[0] });
                lastIndex = imgRegex.lastIndex;
            }
            if (lastIndex < prepared.length) tokens.push({ type: 'text', val: prepared.slice(lastIndex) });

            // Печатаем токены по-символьно
            let charIndex = 0;
            const totalChars = tokens.reduce((s, t) => s + (t.type === 'text' ? t.val.length : 1), 0);
            // расчет длительности основывается на количестве символов
            let duration = Math.min(MAX_DURATION, BASE_DURATION + totalChars * PER_CHAR);

            function typeTokens(iToken = 0, iChar = 0) {
                if (iToken >= tokens.length) {
                    // закончено — оставляем видимым до duration, затем убираем
                    bubble.style.animation = `floatFade ${Math.min(1.0, duration / 1000)}s ease forwards`;
                    bubble.style.opacity = '1';
                    // небольшая glitch-анимация рандомно
                    if (Math.random() < 0.45) msg.classList.add('glitching');
                    setTimeout(() => removeBubble(bubble), duration);
                    // позиционируем корректно после отрисовки
                    adjustPosition(bubble, stageW, stageH);
                    return;
                }
                const token = tokens[iToken];
                if (token.type === 'html') {
                    // вставляем сразу всю картинку-эмот
                    msg.insertAdjacentHTML('beforeend', token.val);
                    // маленькая пауза как будто печатание
                    setTimeout(() => typeTokens(iToken + 1, 0), TYPING_SPEED * 2);
                } else {
                    // печатаем символы из token.val
                    if (iChar < token.val.length) {
                        const ch = token.val[iChar];
                        // Для HTML-энкодинга: заменяем <>&
                        const safe = ch.replace && ch.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        // Вставляем текстовый узел последним (если последний узел — текст, добавляем к нему)
                        const lastNode = msg.lastChild;
                        if (lastNode && lastNode.nodeType === Node.TEXT_NODE) {
                            lastNode.nodeValue += safe;
                        } else {
                            msg.appendChild(document.createTextNode(safe));
                        }
                        // визуальные эффекты при печати
                        bubble.style.opacity = '1';
                        // следующая буква
                        setTimeout(() => typeTokens(iToken, iChar + 1), TYPING_SPEED);
                    } else {
                        // следующий токен
                        setTimeout(() => typeTokens(iToken + 1, 0), Math.max(0, TYPING_SPEED / 1.5));
                    }
                }
            }

            // Сразу позиционируем в рандомное место — но точную позицию подправим позже
            // выберем грубые координаты
            const roughLeft = Math.random() * (stageW * 0.9);
            const roughTop = Math.random() * (stageH * 0.85);
            bubble.style.left = Math.max(AVOID_EDGE, Math.min(stageW - 160, roughLeft)) + 'px';
            bubble.style.top = Math.max(AVOID_EDGE, Math.min(stageH - 80, roughTop)) + 'px';
            // Запускаем печать
            typeTokens(0, 0);
        }

        /* Корректируем позицию чтобы элемент не вылезал за края */
        function adjustPosition(bubble, stageW, stageH) {
            const rect = bubble.getBoundingClientRect();
            const bw = rect.width, bh = rect.height;
            let left = parseFloat(bubble.style.left) || 0;
            let top = parseFloat(bubble.style.top) || 0;

            if (left + bw + AVOID_EDGE > stageW) left = Math.max(AVOID_EDGE, stageW - bw - AVOID_EDGE);
            if (top + bh + AVOID_EDGE > stageH) top = Math.max(AVOID_EDGE, stageH - bh - AVOID_EDGE);
            if (left < AVOID_EDGE) left = AVOID_EDGE;
            if (top < AVOID_EDGE) top = AVOID_EDGE;

            bubble.style.left = left + 'px';
            bubble.style.top = top + 'px';

            // плавность появления
            bubble.style.transition = 'opacity 220ms ease, transform 320ms cubic-bezier(.2,.9,.2,1)';
            bubble.style.transform = 'translateY(0) scale(1)';
            bubble.style.opacity = '1';

            // небольшая задержка перед float-анимацией и возможным смещением
            setTimeout(() => {
                bubble.style.transform = 'translateY(-2px)';
            }, 220 + Math.random() * 180);
        }

        /* Удаление пузыря с плавным исчезновением */
        function removeBubble(bubble) {
            if (!bubble || bubble.classList.contains('removing')) return;
            bubble.classList.add('removing');
            bubble.classList.add('fade-out');
            setTimeout(() => {
                if (bubble.parentElement) bubble.parentElement.removeChild(bubble);
            }, 700);
        }

        /* Очистка всех пузырей (для теста) */
        function clearBubbles() {
            const nodes = Array.from(stage.querySelectorAll('.chat-bubble'));
            nodes.forEach(n => n.remove());
        }

        /* ==== StreamElements listener (часто в SE события приходят через onEventReceived) ==== */
        window.addEventListener('onEventReceived', function (obj) {
            try {
                const data = obj && obj.detail ? obj.detail : obj;
                // В StreamElements действие message обычно приходит с listener = 'message' или type = 'message'
                if (!data) return;
                let payload = null;
                // StreamElements: data.event содержит подробности
                if (data.event) payload = data.event;
                else payload = data;

                // Пример полей: payload.displayName, payload.avatar, payload.data.message
                const username = payload.displayName || payload.username || payload.name || (payload.data && (payload.data.displayName || payload.data.name)) || (payload.tags && payload.tags.displayName) || 'user';
                // StreamElements и другие виджеты иногда помещают текст в payload.data.message или payload.body
                const message = (payload.message && typeof payload.message === 'string') ? payload.message
                    : (payload.data && (payload.data.text || payload.data.message)) ? (payload.data.text || payload.data.message)
                        : payload.text || payload.body || payload.data && payload.data.body || '';

                // аватар
                const avatar = payload.avatar || payload.image || (payload.data && (payload.data.avatar || payload.data.image)) || DEFAULT_AVATAR;

                // эмоты — если источник отправляет маппинг (не обязателен)
                const emotes = payload.emotes || payload.emote_map || (payload.data && payload.data.emotes) || {};

                // Только сообщения чата (если есть метка listener)
                const isChatMessage = (data.listener && data.listener.toLowerCase().includes('message')) || (data.type && data.type.toLowerCase().includes('message')) || true;
                if (isChatMessage) {
                    createBubble({ username, avatar, message, emotes });
                }
            } catch (err) {
                console.warn('onEventReceived handler error', err);
            }
        });

        /* ==== Альтернативный путь: получать сообщения через postMessage от внешнего реле/скрипта ==== */
        window.addEventListener('message', function (e) {
            if (!e.data) return;
            if (e.data.type === 'remoteMessage' && e.data.payload) {
                const p = e.data.payload;
                // ожидаем payload: { username, avatar, message, emotes }
                createBubble({
                    username: p.username || p.nick || 'user',
                    avatar: p.avatar || DEFAULT_AVATAR,
                    message: p.message || '',
                    emotes: p.emotes || {}
                });
            }
        });

        /* ==== Контролы для локального теста ==== */
        document.getElementById('btnSmall').addEventListener('click', () => {
            createBubble({
                username: 'retro_bot',
                avatar: DEFAULT_AVATAR,
                message: 'Short message',
                emotes: {}
            });
        });
        document.getElementById('btnLong').addEventListener('click', () => {
            createBubble({
                username: 'arcade_1984',
                avatar: DEFAULT_AVATAR,
                message: 'Это длинный тестовый текст — проверяем, как ведёт себя эффект печатания и сколько времени нужно, чтобы сообщение оставалось на экране. Вперед — к багам и глитчам!',
                emotes: {}
            });
        });
        document.getElementById('btnEmote').addEventListener('click', () => {
            createBubble({
                username: 'emote_lover',
                avatar: DEFAULT_AVATAR,
                message: 'Погнали Kappa PogChamp <:heart:> Kappa',
                emotes: {
                    'Kappa': 'https://static-cdn.jtvnw.net/emoticons/v2/25/default/dark/1.0',
                    'PogChamp': 'https://static-cdn.jtvnw.net/emoticons/v2/88/default/dark/1.0',
                    '<:heart:>': 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"><circle cx="32" cy="32" r="30" fill="#39ff14"/></svg>')
                }
            });
        });
        document.getElementById('btnClear').addEventListener('click', clearBubbles);

        /* ==== Полезные примечания (не код) ====
         - StreamElements обычно передаёт event-объект в onEventReceived; если он отличается в вашей конфигурации,
           откройте консоль браузера и посмотрите что приходит: window.addEventListener('onEventReceived', e => console.log(e));
         - Если хотите, чтобы эмоты из BTTV/7TV/FFZ показывались, лучше использовать StreamElements (он уже умеет подтягивать популярные эмоджи)
           либо настроить отдельный rеле (node.js) который будет подставлять реальные URL эмот в поле emotes и отправлять в этот оверлей через postMessage/WebSocket.
         - Поддерживается простая подмена: если emotes = { "Kappa": "https://.../kappa.png" } то в тексте все вхождения "Kappa" заменятся картинкой.
        */

        /* EOF */
    </script>
</body>

</html>
